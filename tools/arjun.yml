name: arjun
binary: arjun
description: HTTP parameter discovery suite.
target_flag: "-u"
structured_output:
  format: json
  flag: "-oJ"
  path: "/tmp/kinetic/logs/{task_id}.json"
default_flags: []
allowed_flags:
  - "-m"
  - "-w"
  - "-t"
  - "-d"
  - "--headers"
  - "--stable"
  - "--include"
  - "-q"
